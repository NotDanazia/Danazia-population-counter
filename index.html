<!DOCTYPE html>
<html>
<head>
    <title>Danazia Population Live</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            background-color: #add8e6;
            padding: 20px;
        }
        #counter {
            font-size: 2em;
            color: #2e8b57;
        }
        h1 {
            color: #2e8b57;
        }
        img {
            max-width: 200px;
            margin: 20px auto;
        }
        #localTime {
            font-size: 1.5em;
            color: #555;
            margin-top: 20px;
        }
    </style>
</head>
<body>

<h1>Danazia Population Live</h1>

<img src="https://3ba8d8ca06.cbaul-cdnwnd.com/ad31ff7aa5568419f0bcf71e9af28d64/200000003-acfe8acfea/drapeau%20Danazie.webp?ph=3ba8d8ca06">

<div id="counter">150,377,148</div>
<div id="localTime">Local time: --:--:--</div>

<script>
const startValue = 150377148;

// 🎯 croissance FIXE garantie
const annualGrowthRate = 0.0085;

// 📅 date de référence (NE CHANGE JAMAIS)
const startDate = new Date("2024-10-16T00:00:00-05:00").getTime();

const secondsPerYear = 365.25 * 24 * 60 * 60;

// 🧠 population calculée DIRECTEMENT depuis le temps
function getTruePopulation() {
    const now = Date.now();
    const years = (now - startDate) / (1000 * secondsPerYear);

    return startValue * Math.pow(1 + annualGrowthRate, years);
}

// 🎭 petit effet visuel (ne modifie PAS la réalité)
let noise = 0;

function updateNoise() {
    noise = Math.sin(Date.now() / 2000) * 800;
}

setInterval(updateNoise, 1000);

// 📊 affichage
function updateCounter() {
    const base = getTruePopulation();
    const display = Math.floor(base + noise);

    document.getElementById("counter").innerText =
        display.toLocaleString();

    requestAnimationFrame(updateCounter);
}

// 🕒 heure locale (UTC+3)
function updateLocalTime() {
    const now = new Date();

    const utc3 = new Date(
        now.getTime() +
        now.getTimezoneOffset() * 60000 +
        3 * 3600000
    );

    const h = utc3.getHours().toString().padStart(2, '0');
    const m = utc3.getMinutes().toString().padStart(2, '0');
    const s = utc3.getSeconds().toString().padStart(2, '0');

    document.getElementById("localTime").innerText =
        `Local time: ${h}:${m}:${s}`;
}

setInterval(updateLocalTime, 1000);
updateCounter();

</script>

</body>
</html>
