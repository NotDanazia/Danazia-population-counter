<!DOCTYPE html>
<html>
<head>
    <title>Danazia Population Live</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            background-color: #add8e6;
            padding: 20px;
        }
        #counter {
            font-size: 2em;
            color: #2e8b57;
        }
        h1 {
            color: #2e8b57;
        }
        img {
            max-width: 200px;
            margin: 20px auto;
        }
        #localTime {
            font-size: 1.5em;
            color: #555;
            margin-top: 20px;
        }
    </style>
</head>
<body>
    <h1>Danazia Population Live</h1>

    <img src="https://3ba8d8ca06.cbaul-cdnwnd.com/ad31ff7aa5568419f0bcf71e9af28d64/200000003-acfe8acfea/drapeau%20Danazie.webp?ph=3ba8d8ca06">

    <div id="counter">150,377,148</div>
    <div id="localTime">Local time: --:--:--</div>

<script>
    const startValue = 150377148;

    // 🎯 croissance FIXE garantie
    const annualGrowthRate = 0.0085;

    const startDate = new Date("2024-10-16T00:00:00-05:00").getTime();

    // 🧠 population réelle (math parfaite)
    function getTruePopulation() {
        const now = Date.now();
        const years = (now - startDate) / (1000 * 60 * 60 * 24 * 365.25);

        return startValue * Math.pow(1 + annualGrowthRate, years);
    }

    // 🎲 bruit VISUEL uniquement (ne modifie PAS la réalité)
    let visualNoise = 0;

    function updateVisualNoise() {
        // petit bruit contrôlé
        visualNoise = (Math.random() - 0.5) * 2000; 
    }

    setInterval(updateVisualNoise, 2000);

    function updateCounter() {
        const truePop = getTruePopulation();

        // affichage légèrement vivant
        const displayPop = Math.floor(truePop + visualNoise);

        document.getElementById("counter").innerText =
            displayPop.toLocaleString();

        requestAnimationFrame(updateCounter);
    }

    function updateLocalTime() {
        const now = new Date();
        const utc3Time = new Date(
            now.getTime() +
            now.getTimezoneOffset() * 60000 +
            3 * 3600000
        );

        const h = utc3Time.getHours().toString().padStart(2, '0');
        const m = utc3Time.getMinutes().toString().padStart(2, '0');
        const s = utc3Time.getSeconds().toString().padStart(2, '0');

        document.getElementById("localTime").innerText =
            `Local time: ${h}:${m}:${s}`;
    }

    function init() {
        updateCounter();
        setInterval(updateLocalTime, 1000);
    }

    init();
</script>

</body>
</html>
