<!DOCTYPE html>
<html>
<head>
    <title>Danazia Population Live</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            background-color: #add8e6;
            padding: 20px;
        }
        #counter {
            font-size: 2em;
            color: #2e8b57;
        }
        h1 {
            color: #2e8b57;
        }
        #localTime {
            font-size: 1.2em;
            color: #555;
            margin-top: 15px;
        }
    </style>
</head>
<body>

<h1>Danazia Population Live</h1>

<div id="counter">151,926,000</div>
<div id="localTime">Local time: --:--:--</div>

<script>

// 📅 base EXACTE
const startPopulation = 151926000;
const startDate = new Date("2026-01-01T00:00:00").getTime();

// ⏱️ tes intervalles EXACTS
const birthInterval = 13.1877;     // secondes
const deathInterval = 28.6756;     // secondes

// 🧠 temps écoulé
function getSecondsElapsed() {
    return (Date.now() - startDate) / 1000;
}

// 👶 naissances cumulées
function getBirths() {
    return Math.floor(getSecondsElapsed() / birthInterval);
}

// ⚰️ décès cumulés
function getDeaths() {
    return Math.floor(getSecondsElapsed() / deathInterval);
}

// 📊 population finale (déterministe)
function getPopulation() {
    return startPopulation + getBirths() - getDeaths();
}

// 🎭 affichage
function update() {
    const pop = getPopulation();

    document.getElementById("counter").innerText =
        Math.floor(pop).toLocaleString();

    requestAnimationFrame(update);
}

// 🕒 heure locale
function updateTime() {
    const now = new Date();

    const h = now.getHours().toString().padStart(2,'0');
    const m = now.getMinutes().toString().padStart(2,'0');
    const s = now.getSeconds().toString().padStart(2,'0');

    document.getElementById("localTime").innerText =
        `Local time: ${h}:${m}:${s}`;
}

setInterval(updateTime, 1000);
update();

</script>

</body>
</html>
